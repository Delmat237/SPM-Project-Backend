spring.config.import=optional:file:.env[.properties]

spring.application.name=auth
server.port=${SERVER_PORT:8082}

spring.datasource.url=${URL_BD:jdbc:postgresql://localhost:5432/bd_spm}
spring.datasource.username=${DB_USERNAME:user_bd_spm}
spring.datasource.password=${DB_PASSWORD:spm1234}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:mySuperSecretKeyForDevOnlyPleaseChangeInProduction1234567890abcdefghijklmnopqrstuvwxyz}
jwt.expiration=${JWT_EXPIRATION:1500000}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:noreply@example.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# URLs de l'application (configurer dans .env)
app.backend.url=${APP_BACKEND_URL:http://localhost:8080}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# OAuth Google
google.client.id=${GOOGLE_CLIENT_ID:none}

# Upload de fichiers (Module Collaboration)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=110MB
app.upload.dir=${UPLOAD_DIR:./uploads}
